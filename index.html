<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <meta
      name="description"
      content="Personal portfolio website showcasing skills, experience, and selected projects."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="hero-screen" id="home">
      <div id="stars" class="stars" aria-hidden="true"></div>

      <header class="topbar">
        <button class="menu-btn" aria-label="Open menu" type="button">
          <span></span>
          <span></span>
        </button>
      </header>

      <span id="emailRail" class="email-rail" aria-hidden="true"></span>

      <div class="hero-wrap">
        <div class="hero-main">
          <h1 class="hero-title">
            <span id="heroLine1">FRONTEND</span>
            <span id="heroLine2">DEVELOPER</span>
          </h1>
          <p id="heroSubtitle" class="hero-subtitle">
            Hi! I'm Your Name. A creative Frontend Developer with 3+ years of experience in building high-performance, scalable, and responsive web solutions.
          </p>
          <a id="primaryCta" class="hire-btn" href="#contact">HIRE ME</a>
        </div>

        <div class="stats-shell" aria-label="Key statistics and scroll progress">
          <aside id="stats" class="stats-rail" aria-label="Key statistics"></aside>
          <div class="scroll-indicator" aria-hidden="true">
            <span id="scrollFill" class="scroll-fill"></span>
          </div>
        </div>
      </div>
    </section>

    <section class="after-hero" id="contact">
      <p class="after-text">Have a project in mind?</p>
      <a id="contactMail" href="mailto:you@example.com">you@example.com</a>
      <p id="footerNote">Designed & built by Your Name</p>
    </section>

    <script src="script.js"></script>
  </body>
</html>
