<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <meta
      name="description"
      content="Personal portfolio website showcasing skills, experience, and selected projects."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="intro-loading">
    <div id="introOverlay" class="intro-overlay" aria-hidden="true">
      <div id="introName" class="intro-name" data-name="AUSTIN"></div>
      <div id="revealBlocks" class="reveal-columns" aria-hidden="true"></div>
    </div>

    <section class="hero-screen" id="home">
      <div class="hero-steps" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div id="stars" class="stars" aria-hidden="true"></div>

      <header class="topbar">
        <nav class="top-nav" aria-label="Primary navigation">
          <a href="#">About</a>
          <a href="#">Experience</a>
          <a href="#">Skills</a>
          <a href="#">Projects</a>
          <a href="#contact">Contact</a>
        </nav>
      </header>

      <div class="hero-wrap">
        <div class="hero-main">
          <h1 class="hero-title">
            <span id="heroLine1">FRONTEND</span>
            <span id="heroLine2">DEVELOPER</span>
          </h1>
          <p id="heroSubtitle" class="hero-subtitle">
            Hi! I'm Your Name. A creative Frontend Developer with 3+ years of experience in building high-performance, scalable, and responsive web solutions.
          </p>
          <a id="primaryCta" class="hire-btn" href="#contact">HIRE ME</a>
        </div>

        <div class="hero-visual" aria-hidden="true">
          <div class="hero-photo-slot"></div>
        </div>
      </div>
    </section>

    <section class="after-hero" id="contact">
      <aside id="stats" class="stats-rail stats-below" aria-label="Key statistics"></aside>
      <p class="after-text">Have a project in mind?</p>
      <a id="contactMail" href="mailto:you@example.com">you@example.com</a>
      <p id="footerNote">Designed & built by Your Name</p>
    </section>

    <script src="script.js"></script>
  </body>
</html>
